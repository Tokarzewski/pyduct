name: Example 3-Zone Supply Network

# Optional: Custom fluid (omit for standard air)
fluid: null

components:
  ahu:
    type: Source
    name: AHU

  main_duct:
    type: RigidDuct
    name: Main Trunk
    cross_section:
      shape: round
      diameter: 0.25
    length: 25
    absolute_roughness: 0.0001

  main_tee:
    type: Tee
    name: Main Tee
    cross_section:
      shape: round
      diameter: 0.25
    zeta_straight: 0.0
    zeta_branch: 0.5

  branch1_duct:
    type: RigidDuct
    name: Branch 1 Duct
    cross_section:
      shape: round
      diameter: 0.15
    length: 20
    absolute_roughness: 0.0001

  branch2_duct:
    type: RigidDuct
    name: Branch 2 Duct
    cross_section:
      shape: round
      diameter: 0.12
    length: 15
    absolute_roughness: 0.0001

  zone1_terminal:
    type: Terminal
    name: Zone 1 Diffuser
    flowrate: 0.10
    zeta: 0.3

  zone2_terminal:
    type: Terminal
    name: Zone 2 Diffuser
    flowrate: 0.07
    zeta: 0.3

# Connections define the network topology
connections:
  - source: ahu
    target: main_duct
  - source: main_duct
    target: main_tee.combined
  - source: main_tee.straight
    target: branch1_duct
  - source: branch1_duct
    target: zone1_terminal
  - source: main_tee.branch
    target: branch2_duct
  - source: branch2_duct
    target: zone2_terminal
